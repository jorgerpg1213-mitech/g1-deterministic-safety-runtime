amcl:
  ros__parameters:

    use_sim_time: false

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: "/scan"

    min_particles: 500
    max_particles: 2000

    update_min_d: 0.2
    update_min_a: 0.2

    resample_interval: 1

    transform_tolerance: 1.0

    laser_max_range: 20.0
    laser_min_range: 0.0
