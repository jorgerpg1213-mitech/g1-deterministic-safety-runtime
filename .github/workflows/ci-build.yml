name: CI Build

# Level 1 — Build Validation
# Level 2 — Smoke Validation
#
# SCOPE EXPLÍCITO:
#   - Buildea pipeline-base y pipeline-runtime desde los Dockerfiles del proyecto
#   - Ejecuta colcon build explícitamente dentro del container CI
#   - Ejecuta smoke tests reproducibles sobre workspace compilado
#
# RATIONALE POST-3C:
#   Docker layer cache no garantiza metadata válida para colcon test
#   en GitHub Actions runners. El build explícito elimina dependencia
#   implícita de install/ precalculado dentro de Dockerfile.runtime.
#
# NO VALIDA TODAVÍA:
#   - Integration testing ROS2 real (launch_testing)
#   - Runtime humanoid G1 real
#   - Isaac Sim
#   - Hardware físico
#   - DDS timing characterization

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build pipeline-runtime + Smoke Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pipeline-base
        run: |
          set -eo pipefail

          docker build \
            -f docker/Dockerfile.base \
            -t pipeline-base:ci \
            .

      - name: Build pipeline-runtime
        run: |
          set -eo pipefail

          docker build \
            -f docker/Dockerfile.runtime \
            -t pipeline-runtime:ci \
            .

      - name: Run reproducible smoke tests inside pipeline-runtime
        run: |
          set -eo pipefail

          docker run --rm \
            -e ROS_DOMAIN_ID=99 \
            -e PIPELINE_WS=/root/pipeline_ws \
            -e PIPELINE_SHARE=/mnt/g1_share \
            pipeline-runtime:ci \
            bash -c "
              set -eo pipefail

              cd /root/pipeline_ws

              source /opt/ros/humble/setup.bash

              colcon build --symlink-install

              source install/setup.bash

              colcon test \
                --packages-select \
                agv_bringup \
                g1_msgs \
                g1_description

              colcon test-result --verbose --all
            "
