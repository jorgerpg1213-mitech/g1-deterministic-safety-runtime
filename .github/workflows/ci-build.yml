name: CI Build

# Level 1 — Build Validation
# Level 2 — Smoke Validation
#
# SCOPE EXPLÍCITO:
#   - Buildea pipeline-base y pipeline-runtime desde los Dockerfiles del proyecto
#   - Dockerfile.runtime ejecuta colcon build internamente — install/ queda en la imagen
#   - Smoke tests corren dentro de pipeline-runtime:ci sobre install/ ya compilado
#
# PRECONDICIÓN EXPLÍCITA:
#   Dockerfile.runtime hace colcon build y preserva install/ en la imagen.
#   Si eso cambia, este workflow requiere agregar colcon build en el step de tests.
#
# NO VALIDA TODAVÍA:
#   - Integration testing ROS2 real (launch_testing — siguiente paso Capa 2)
#   - Resiliencia real de watchdog/recovery
#   - Runtime humanoid G1
#   - Hardware físico o Isaac Sim

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build pipeline-runtime + Smoke Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pipeline-base
        run: |
          set -eo pipefail
          docker build \
            -f docker/Dockerfile.base \
            -t pipeline-base:ci \
            .

      - name: Build pipeline-runtime
        run: |
          set -eo pipefail
          docker build \
            -f docker/Dockerfile.runtime \
            -t pipeline-runtime:ci \
            .

      - name: Verify install/ exists inside pipeline-runtime
        run: |
          set -eo pipefail
          docker run --rm pipeline-runtime:ci \
            bash -c "test -f /root/pipeline_ws/install/setup.bash && echo 'INSTALL OK' || (echo 'INSTALL MISSING — Dockerfile.runtime must run colcon build' && exit 1)"

      - name: Run smoke tests inside pipeline-runtime
        run: |
          set -eo pipefail
          docker run --rm \
            -e ROS_DOMAIN_ID=99 \
            -e PIPELINE_WS=/root/pipeline_ws \
            -e PIPELINE_SHARE=/mnt/g1_share \
            pipeline-runtime:ci \
            bash -c "
              set -eo pipefail
              source /opt/ros/humble/setup.bash
              source /root/pipeline_ws/install/setup.bash
              colcon test --packages-select agv_bringup g1_msgs g1_description
              colcon test-result --verbose --all
            "
